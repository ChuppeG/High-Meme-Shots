<!DOCTYPE html>
<html>
<head>
    <title>Meme High Shot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; margin: 0; overflow: hidden; }
        
        /* THE GAME STAGE */
        #game-area { 
            display: none; 
            position: relative; 
            width: 100%; 
            height: 80vh; 
            background: #87CEEB; /* Sky Blue */
            overflow: hidden;
            border-bottom: 10px solid #654321;
        }

        /* SCROLLING CLOUDS (Moving Forward Effect) */
        #background-scroll {
            position: absolute;
            width: 200%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/cloudy-day.png');
            opacity: 0.5;
            top: 0;
            left: 0;
        }

        /* THE FROG */
        #frog { 
            font-size: 80px; 
            position: absolute; 
            left: 100px; /* Stay on the left side while background moves */
            top: 200px;
            user-select: none;
            z-index: 10;
        }

        /* BUTTONS */
        .btn { padding: 15px 25px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; color: white; }
        #connectBtn { background: #007bff; margin-top: 50px;}
        #paySection { display: none; margin-top: 50px; }
        .payUsdt { background: #35d07f; }
        .payCelo { background: #fbcc5c; color: #333; }
    </style>
</head>
<body>

    <h1>🚀 Meme High Shot</h1>
    <p id="status">Connect wallet to play</p>

    <button id="connectBtn" class="btn" onclick="connect()">CONNECT WALLET</button>

    <div id="paySection">
        <button id="btnUsdt" class="btn payUsdt" onclick="payWithUSDT()">PAY 0.1 USDT</button>
        <button id="btnCelo" class="btn payCelo" onclick="payWithCelo()">PAY 0.1 CELO</button>
    </div>

    <div id="game-area" onmousedown="jump()" ontouchstart="jump()">
        <div id="background-scroll"></div>
        <h2 style="position:relative; z-index:20;">Altitude: <span id="score">0</span>m</h2>
        <div id="frog">🐸</div>
    </div>

    <script>
        const contractAddress = "0x9ca3E7497B9ee5Ab58310F0B391eB417513dA29d";
        const usdtAddress = "0x48065fbBE25f71C9282ddf5e1cD6D6A887483D5e";
        const abi = [
            "function payWithCelo() public payable",
            "function payWithUSDT() public",
            "function approve(address spender, uint256 amount) public returns (bool)"
        ];

        let signer, gameContract, usdtContract;
        let score = 0;
        let posY = 200;
        let velocity = 0;
        let gravity = 0.4;
        let lift = -8;
        let bgPos = 0;
        let isGameRunning = false;

        // 1. WALLET LOGIC
        window.onload = () => {
            if (window.ethereum && window.ethereum.isMiniPay) {
                document.getElementById('connectBtn').style.display = 'none';
                connect();
            }
        };

        async function connect() {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('paySection').style.display = 'block';
                document.getElementById('status').innerText = "Ready to Fly!";
                
                // Hide CELO on MiniPay
                if(window.ethereum.isMiniPay) { document.getElementById('btnCelo').style.display = 'none'; }

                gameContract = new ethers.Contract(contractAddress, abi, signer);
                usdtContract = new ethers.Contract(usdtAddress, abi, signer);
            } catch (e) { alert("Connect error"); }
        }

        async function payWithCelo() {
            try {
                const tx = await gameContract.payWithCelo({ value: ethers.utils.parseEther("0.1") });
                await tx.wait();
                startGame();
            } catch (e) { alert(e.message); }
        }

        async function payWithUSDT() {
            try {
                const amount = ethers.utils.parseUnits("0.1", 6);
                const appTx = await usdtContract.approve(contractAddress, amount);
                await appTx.wait();
                const payTx = await gameContract.payWithUSDT();
                await payTx.wait();
                startGame();
            } catch (e) { alert(e.message); }
        }

        // 2. GAME ENGINE
        function startGame() {
            document.getElementById('paySection').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            isGameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (!isGameRunning) return;
            velocity = lift;
            score += 10; // Gain altitude on jump
            document.getElementById('score').innerText = score;
        }

        function gameLoop() {
            if (!isGameRunning) return;

            // Physics
            velocity += gravity;
            posY += velocity;
            bgPos -= 2; // Moving forward speed

            // Moving Background Effect
            document.getElementById('background-scroll').style.left = (bgPos % 100) + "%";

            // Collision with Ground
            const ground = document.getElementById('game-area').clientHeight - 100;
            if (posY > ground) {
                posY = ground;
                gameOver();
            }

            // Infinite Ceiling (Frog stays on screen, but score keeps going up)
            if (posY < 50) {
                posY = 50; 
                velocity = 0;
            }

            document.getElementById('frog').style.top = posY + "px";
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isGameRunning = false;
            alert("CRASHED! Max Altitude: " + score + "m");
            location.reload();
        }
    </script>
</body>
</html>
